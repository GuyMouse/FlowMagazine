
services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=classroomdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - classroom-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.Backend
    container_name: classroomserver
    environment:
      # App configuration
      - IP_ADDRESS=0.0.0.0
      - PORT=5000

      # PostgreSQL configuration
      - POSTGRES_CONNECTION_STRING=Host=postgres;Database=classroomdb;Username=postgres;Password=postgres

      # ASP.NET Core environment
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - classroom-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.Frontend.Dev
    container_name: classroommgmt
    ports:
      - "3000:3000"
    volumes:
      # Mount the source code for hot reload
      - ./ClassroomMgmt:/app
      - /app/node_modules
    environment:
      # Bind dev server to all interfaces
      - HOST=0.0.0.0
      # Enable polling for file changes in Docker
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_API_URL=http://localhost:5000
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    networks:
      - classroom-network
    stdin_open: true
    tty: true

volumes:
  postgres_data:

networks:
  classroom-network:
    driver: bridge

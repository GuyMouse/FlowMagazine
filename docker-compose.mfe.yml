
services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-mfe
    restart: unless-stopped
    environment:
      - POSTGRES_DB=classroomdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - classroom-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.Backend
    container_name: classroomserver-mfe
    environment:
      # App configuration
      - IP_ADDRESS=0.0.0.0
      - PORT=5000

      # PostgreSQL configuration
      - POSTGRES_CONNECTION_STRING=Host=postgres;Database=classroomdb;Username=postgres;Password=postgres

      # ASP.NET Core environment
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - classroom-network

  # Instructor frontend (dev server) – for socket testing alongside student
  frontend-instructor:
    build:
      context: .
      dockerfile: Dockerfile.Frontend.Dev
    container_name: classroommgmt-instructor-mfe
    ports:
      - "3001:3000"
    volumes:
      - ./ClassroomMgmt:/app
      - /app/node_modules
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - REACT_APP_API_URL=http://localhost:5000
      - REACT_APP_BASE_PATH=/instructor
      - REACT_APP_MICROFRONTEND_NAME=classroom-instructor
      - WDS_SOCKET_PORT=3001
    depends_on:
      - backend
    networks:
      - classroom-network
    stdin_open: true
    tty: true

  # Student frontend (dev server) – for socket testing alongside instructor
  frontend-student:
    build:
      context: .
      dockerfile: Dockerfile.Frontend.Dev
    container_name: classroommgmt-student-mfe
    ports:
      - "3002:3000"
    volumes:
      - ./ClassroomMgmt:/app
      - /app/node_modules
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - REACT_APP_API_URL=http://localhost:5000
      - REACT_APP_BASE_PATH=/student
      - REACT_APP_MICROFRONTEND_NAME=classroom-student
      - WDS_SOCKET_PORT=3002
    depends_on:
      - backend
    networks:
      - classroom-network
    stdin_open: true
    tty: true

volumes:
  postgres_data:

networks:
  classroom-network:
    driver: bridge

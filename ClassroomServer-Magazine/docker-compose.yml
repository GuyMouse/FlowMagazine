# HERLLO
services:
  classroomserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: classroomserver
    environment:
      # App configuration
      - IP_ADDRESS=0.0.0.0
      - PORT=5000

      # PostgreSQL configuration
      - POSTGRES_CONNECTION_STRING=Host=postgres;Database=classroomdb;Username=postgres;Password=postgres

      # ASP.NET Core environment
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

